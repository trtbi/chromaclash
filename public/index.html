<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Game Interface</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .controls { display: flex; gap: 10px; margin: 20px 0; }
        button { padding: 10px 20px; font-size: 16px; border: none; border-radius: 4px; cursor: pointer; transition: background 0.2s; }
        .btn-primary { background: #007bff; color: white; }
        .btn-primary:hover { background: #0056b3; }
        .btn-refresh { background: #dc3545; color: white; }
        .btn-refresh:hover { background: #bd2130; }
        .status-panel { background: #e9ecef; padding: 15px; border-radius: 4px; margin-bottom: 20px; }
        .log-container { background: #222; color: #00ff00; padding: 15px; border-radius: 4px; height: 200px; overflow-y: auto; font-family: monospace; }
        .log-entry { padding: 4px 0; border-bottom: 1px solid #333; }
    </style>
</head>
<body>

<div class="container">
    <h2>Game Dashboard</h2>
    
    <div class="status-panel">
        <div><strong>Current Score:</strong> <span id="score-display">0</span></div>
        <div><strong>Action Status:</strong> <span id="action-display">Awaiting Turn...</span></div>
        <div><strong>Deck Count:</strong> <span id="deck-display">80</span> (Wild cards removed)</div>
    </div>

    <div class="controls">
        <button class="btn-primary" id="action-btn">Perform Turn Action</button>
        <!-- Refresh button for during play to reset turn -->
        <button class="btn-refresh" id="refresh-btn">🔄 Reset Turn Action</button>
    </div>

    <h3>Table Activity (Most Recent at Top)</h3>
    <div id="activity-log" class="log-container"></div>
</div>

<script>
    // Fetch and render initial load state
    function fetchGameState() {
        fetch('/api/game')
            .then(res => res.json())
            .then(game => renderUI(game));
    }

    function renderUI(game) {
        document.getElementById('score-display').textContent = game.currentState.score;
        document.getElementById('action-display').textContent = game.currentState.hasDrawn ? "Action Committed" : "Awaiting Action";
        document.getElementById('deck-display').textContent = game.deck.length;
        
        // Render history log with the most recent entry at the top
        const logContainer = document.getElementById('activity-log');
        logContainer.innerHTML = '';
        
        // Reverse array clone to put the most recent entry first
        const recentFirst = [...game.logs].reverse();
        recentFirst.forEach(log => {
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.textContent = `> ${log}`;
            logContainer.appendChild(entry);
        });
    }

    // Event: Perform Game Turn Action
    document.getElementById('action-btn').addEventListener('click', () => {
        fetch('/api/game/start-action', { method: 'POST' })
            .then(res => res.json())
            .then(game => renderUI(game));
    });

    // Event: Refresh Button (Revert to state prior to current action)
    document.getElementById('refresh-btn').addEventListener('click', () => {
        fetch('/api/game/reset-turn', { method: 'POST' })
            .then(res => res.json())
            .then(data => {
                if(data.success) {
                    renderUI(data.game);
                } else {
                    alert(data.message);
                }
            })
            .catch(err => console.error("Error resetting state:", err));
    });

    // Initialize Game state UI on load
    fetchGameState();
</script>

</body>
</html>
