<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chroma Clash</title>
<style>
  :root{
    --bg-base:#fbfaf8;
    --panel:#ffffff;
    --panel-2:#f4f2ec;
    --brass:#B8860B;
    --brass-soft:#C9A227;
    --ink:#2A2A28;
    --ink-dim:#6E6A62;
    --line:#E4E0D6;
    --danger:#D93036;
    --success:#1F8F57;
    --radius:12px;
    --font-display: Georgia,'Iowan Old Style','Palatino Linotype',serif;
    --font-body: -apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:var(--font-body);
    color:var(--ink);
    background:
      linear-gradient(120deg,
        rgba(229,72,77,0.08) 0%,
        rgba(247,107,21,0.08) 14%,
        rgba(255,214,10,0.10) 28%,
        rgba(48,164,108,0.08) 42%,
        rgba(59,130,246,0.08) 57%,
        rgba(139,92,246,0.08) 71%,
        rgba(236,72,153,0.08) 86%,
        rgba(229,72,77,0.06) 100%),
      var(--bg-base);
    background-attachment:fixed;
    min-height:100vh;
    overflow-x:hidden;
  }
  #app{
    max-width:1100px;
    margin:0 auto;
    padding:18px 14px 40px;
    min-height:100vh;
    display:flex;
    flex-direction:column;
  }
  h1.brand{
    font-family:var(--font-display);
    font-weight:700;
    letter-spacing:0.06em;
    text-align:center;
    font-size:28px;
    margin:6px 0 2px;
    color:var(--brass);
    text-shadow:0 0 18px rgba(201,162,39,0.15);
  }
  .tagline{
    text-align:center;
    color:var(--ink-dim);
    font-size:12.5px;
    letter-spacing:0.12em;
    text-transform:uppercase;
    margin-bottom:14px;
  }
  .status-banner{
    text-align:center;
    font-weight:800;
    font-size:17px;
    color:var(--brass);
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:10px;
    padding:11px 16px;
    margin:0 auto 16px;
    max-width:520px;
    letter-spacing:.01em;
    box-shadow:0 2px 10px rgba(0,0,0,.04);
  }
  /* ---- Start screen ---- */
  .start-card{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:26px 22px;
    max-width:580px;
    margin:20px auto;
    text-align:center;
    box-shadow:0 4px 20px rgba(0,0,0,.04);
  }
  .start-card p{color:var(--ink-dim);font-size:14px;line-height:1.6;}
  .start-card h2 {
    font-family: var(--font-display);
    color: var(--brass);
    font-size: 18px;
    margin-top: 18px;
    margin-bottom: 8px;
    text-align: left;
    border-bottom: 1px solid var(--line);
    padding-bottom: 4px;
  }
  .start-card .rules{
    text-align:left;
    font-size:13px;
    color:var(--ink-dim);
    background:var(--panel-2);
    border:1px solid var(--line);
    border-radius:8px;
    padding:14px 16px;
    margin:12px 0;
    line-height:1.65;
  }
  .start-card .rules b{color:var(--ink);}
   
  .visual-scenario {
    background: #fff;
    border-left: 4px solid var(--brass);
    padding: 8px 12px;
    margin: 8px 0;
    font-size: 12.5px;
    border-radius: 0 6px 6px 0;
  }
  .room-input{
    width: 100%;
    max-width: 280px;
    padding: 12px 16px;
    font-size: 15px;
    border: 2px solid var(--line);
    border-radius: 8px;
    margin-bottom: 8px;
    text-align: center;
    font-weight: bold;
  }
  .room-input.code-field {
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .room-input:focus{
    outline: none;
    border-color: var(--brass);
  }
  .go-btn{
    margin-top:10px;
    background:var(--brass);
    color:#fff;
    border:none;
    font-weight:700;
    font-family:var(--font-body);
    font-size:15px;
    padding:12px 30px;
    border-radius:999px;
    cursor:pointer;
    letter-spacing:0.03em;
  }
  .go-btn:hover{background:var(--brass-soft);}
  /* ---- Table layout ---- */
  .game-layout{display:flex;gap:16px;align-items:flex-start;}
  .game-main{flex:1;min-width:0;display:flex;flex-direction:column;gap:14px;}
  .game-side{width:260px;flex-shrink:0;display:flex;flex-direction:column;gap:14px;}
  @media (max-width:760px){
    .game-layout{flex-direction:column;}
    .game-side{width:100%;}
  }
  .opponents{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(120px,1fr));
    gap:10px;
  }
  .opp{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:10px;
    padding:10px 12px;
    text-align:center;
    position:relative;
    transition:all .15s ease;
  }
  .opp.targetable{cursor:pointer;border-color:var(--brass);box-shadow:0 0 0 1px var(--brass) inset;}
  .opp.targetable:hover{background:var(--panel-2);}
  .opp.active-turn{border-color:var(--brass-soft);}
  .opp .name{font-size:13px;font-weight:600;letter-spacing:.02em;}
  .opp .sub{font-size:11px;color:var(--ink-dim);margin-top:3px;}
  .opp .score{font-family:var(--font-display);font-size:20px;color:var(--brass);margin-top:4px;}
  .opp .cardback-stack{margin-top:6px;display:flex;justify-content:center;}
  .cardback{
    width:22px;height:30px;
    border-radius:4px;
    background:repeating-linear-gradient(45deg, #23303a, #23303a 3px, #1a2329 3px, #1a2329 6px);
    border:1px solid var(--brass);
    margin-left:-10px;
  }
  .cardback:first-child{margin-left:0;}
  .center-stage{
    background:radial-gradient(ellipse at center, #ffffff 0%, #f6f4ee 65%, transparent 100%);
    border:1px solid var(--line);
    border-radius:14px;
    min-height:190px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:14px 16px;
    gap:10px;
    position:relative;
  }
  .pile-info{
    text-align:center;
    font-size:11px;
    color:var(--ink-dim);
    letter-spacing:.05em;
    text-transform:uppercase;
    flex-shrink:0;
  }
  .pile-info .count{
    font-family:var(--font-display);
    font-size:26px;
    color:var(--ink);
    display:block;
  }
  .duel-area{
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:150px;
    gap:18px;
  }
  .idle-msg{color:var(--ink-dim);font-size:13px;text-align:center;font-style:italic;}
  /* Trump plaque */
  .trump-plaque{
    display:flex;flex-direction:column;align-items:center;gap:6px;
    animation:plaqueIn .45s cubic-bezier(.2,.9,.3,1.3);
  }
  @keyframes plaqueIn{from{transform:scale(.4) rotateY(90deg);opacity:0;}to{transform:scale(1) rotateY(0);opacity:1;}}
  .trump-label{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--brass);}
  .trump-badge{
    width:64px;height:64px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-family:var(--font-display);font-weight:700;font-size:24px;
    border:3px solid var(--brass);
    box-shadow:0 0 22px rgba(201,162,39,.25);
  }
  .trump-badge.number-badge{background:var(--panel-2);color:var(--brass);}
  .duel-cards{display:flex;align-items:center;gap:14px;}
  .duel-side{display:flex;flex-direction:column;align-items:center;gap:6px;}
  .duel-side .who{font-size:11px;color:var(--ink-dim);text-transform:uppercase;letter-spacing:.05em;}
  .duel-vs{font-family:var(--font-display);color:var(--brass);font-size:14px;}
  .card{
    width:64px;height:92px;
    border-radius:8px;
    border:2px solid rgba(0,0,0,.35);
    display:flex;flex-direction:column;justify-content:space-between;
    padding:5px 6px;
    font-family:var(--font-display);
    font-weight:700;
    cursor:default;
    position:relative;
    box-shadow:0 3px 8px rgba(0,0,0,.18);
    animation:cardFlip .4s ease;
    flex-shrink:0;
  }
  @keyframes cardFlip{from{transform:rotateY(90deg);opacity:0;}to{transform:rotateY(0);opacity:1;}}
  .card .corner{font-size:14px;line-height:1;}
  .card .corner.bottom{align-self:flex-end;transform:rotate(180deg);}
  .card .mid{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:24px;}
  .card.won{outline:3px solid var(--success);}
  .card.lost{outline:3px solid var(--danger); opacity:.55;}
  .card.mini{width:40px;height:58px;}
  .card.mini .corner{font-size:10px;}
  .card.mini .mid{font-size:16px;}
  .card.selectable{cursor:pointer;transition:transform .12s ease;}
  .card.selectable:hover{transform:translateY(-6px);}
  .card.selected{outline:3px solid var(--brass); transform:translateY(-8px);}
  .card.disabled{opacity:.32;filter:grayscale(35%);cursor:default;}
  /* Player area */
  .player-area{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:14px;
    padding:14px 16px 16px;
  }
  .player-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
  .player-head .who{font-weight:700;font-size:14px;}
  .player-head .sc{font-family:var(--font-display);font-size:22px;color:var(--brass);}
  .hand{display:flex;gap:8px;flex-wrap:wrap;min-height:96px;}
  .prompt{
    text-align:center;
    font-size:13.5px;
    color:var(--brass);
    margin:6px 0 12px;
    letter-spacing:.02em;
  }
  .btn-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:10px;}
  .choice-btn{
    background:var(--panel-2);
    border:1px solid var(--line);
    color:var(--ink);
    padding:9px 16px;
    border-radius:8px;
    cursor:pointer;
    font-size:13.5px;
    font-family:var(--font-body);
    transition:all .12s ease;
  }
  .choice-btn:hover{border-color:var(--brass);background:#ece9e0;}
  .choice-btn:disabled{opacity:.35;cursor:not-allowed;}
  .choice-btn:disabled:hover{border-color:var(--line);background:var(--panel-2);}
  .swatch-btn{
    width:52px;height:44px;
    border-radius:8px;
    border:2px solid rgba(0,0,0,.15);
    cursor:pointer;
    font-family:var(--font-display);
    font-weight:700;
    font-size:11px;
    display:flex;align-items:flex-end;justify-content:center;
    padding-bottom:3px;
    transition:transform .12s ease;
  }
  .swatch-btn:hover{transform:translateY(-4px);}
  .num-btn{
    width:42px;height:42px;
    border-radius:50%;
    border:2px solid var(--line);
    background:var(--panel-2);
    color:var(--ink);
    font-family:var(--font-display);
    font-size:16px;
    font-weight:700;
    cursor:pointer;
  }
  .num-btn:hover{border-color:var(--brass);}
  .num-btn .ct{display:block;font-size:8px;color:var(--ink-dim);font-family:var(--font-body);font-weight:400;}
  .confirm-btn{
    background:var(--success);
    border:none;
    color:#ffffff;
    font-weight:700;
    padding:10px 22px;
    border-radius:999px;
    cursor:pointer;
    font-size:13.5px;
  }
  .confirm-btn:disabled{opacity:.35;cursor:default;}
  .history-panel{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:12px;
    padding:0px;
    overflow: hidden;
  }
  .history-panel summary, .chat-panel summary{
    font-weight:700;
    font-size:11.5px;
    letter-spacing:.1em;
    text-transform:uppercase;
    color:var(--ink-dim);
    padding:14px;
    cursor:pointer;
    outline:none;
    user-select:none;
  }
  .log-panel, .chat-log-panel{
    max-height:220px;
    overflow-y:auto;
    font-size:12px;
    color:var(--ink-dim);
    line-height:1.7;
    padding:0 14px 14px 14px;
  }
  .log-panel div, .chat-log-panel div{padding:4px 0;border-bottom:1px dashed var(--line);}
  .log-panel div:last-child, .chat-log-panel div:last-child{color:var(--ink);font-weight:600;border-bottom:none;}
   
  /* Chat styles */
  .chat-panel {
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:12px;
    padding:0px;
    overflow: hidden;
  }
  .chat-input-row {
    display:flex;
    border-top:1px solid var(--line);
  }
  .chat-input-row input {
    flex:1;
    border:none;
    padding:10px 12px;
    font-size:12px;
    outline:none;
    background:transparent;
  }
  .chat-input-row button {
    background:var(--brass);
    color:#fff;
    border:none;
    padding:0 14px;
    font-size:12px;
    font-weight:700;
    cursor:pointer;
  }
  .chat-input-row button:hover { background:var(--brass-soft); }

  /* Expandable Rules Component */
  .expandable-rules-container {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 12px;
  }
  .expandable-rules-container summary {
    font-weight: 700;
    font-size: 11.5px;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--brass);
    cursor: pointer;
    outline: none;
  }
  .expandable-rules-content {
    margin-top: 10px;
    font-size: 12px;
    color: var(--ink-dim);
    line-height: 1.6;
    max-height: 350px;
    overflow-y: auto;
  }
  .overlay{
    position:fixed;inset:0;
    background:rgba(20,18,14,.55);
    display:flex;align-items:center;justify-content:center;
    z-index:50;
    padding:20px;
  }
  .gameover-card{
    background:var(--panel);
    border:1px solid var(--brass);
    border-radius:16px;
    padding:30px 26px;
    max-width:420px;
    width:100%;
    text-align:center;
  }
  .standing{
    display:flex;justify-content:space-between;
    padding:9px 4px;border-bottom:1px solid var(--line);
    font-size:14px;
  }
  .standing.winner{color:var(--brass);font-weight:700;}
  .standing .rank{color:var(--ink-dim);width:22px;text-align:left;}
</style>
</head>
<body>
<div id="app"></div>
<!-- Load Socket.IO Client -->
<script src="/socket.io/socket.io.js"></script>
<script>
/* ===================== DATA ===================== */
const COLORS = [
  {key:'red',    label:'Red',    hex:'#E5484D', text:'#fff'},
  {key:'orange', label:'Orange', hex:'#F76B15', text:'#fff'},
  {key:'yellow', label:'Yellow', hex:'#FFD60A', text:'#20180a'},
  {key:'green',  label:'Green',  hex:'#30A46C', text:'#fff'},
  {key:'pink',   label:'Pink',   hex:'#EC4899', text:'#fff'},
  {key:'white',  label:'White',  hex:'#F1EEE4', text:'#20180a'},
  {key:'black',  label:'Black',  hex:'#17181b', text:'#F1EEE4'},
  {key:'teal',   label:'Teal',   hex:'#14B8A6', text:'#06231f'},
];
const colorInfo = k => COLORS.find(c=>c.key===k);
/* ===================== SOCKET & STATE ===================== */
const socket = io();
let currentRoom = "";
let roomState = null;
let errorMsg = "";
let logs = [];
let chatMessages = [];
/* ===================== SOCKET LISTENERS ===================== */
socket.on("gameStateUpdate", (state) => {
  roomState = state;
  if (state.log) {
    logs = state.log;
  }
  if (state.chat) {
    chatMessages = state.chat;
  }
  errorMsg = "";
  render();
});
socket.on("moveRejected", (reason) => {
  errorMsg = reason;
  render();
});
socket.on("playerDisconnected", (data) => {
  render();
});
socket.on("gameOver", (data) => {
  render();
});
/* ===================== HELPERS ===================== */
function me(){
  return roomState ? roomState.me : null;
}
function isSpectator(){
  if (!roomState) return false;
  return !roomState.players.some(p => p.id === socket.id);
}
function isMyTurn(){
  return !!roomState && roomState.activePlayer === socket.id && !isSpectator();
}
function opponents(){
  return roomState ? roomState.players.filter(p => p.id !== socket.id) : [];
}
function nameOf(id){
  if(!roomState) return '';
  const p = roomState.players.find(x=>x.id===id);
  if(p) return p.name;
  const s = roomState.spectators ? roomState.spectators.find(x=>x.id===id) : null;
  if(s) return s.name + " (Spectator)";
  return id ? id.substring(0,5)+'...' : '';
}
function nameOfPerspective(id) {
  if (!roomState) return '';
  if (id === socket.id) return 'You';
  return nameOf(id);
}
function emitAction(event, payload){
  if (!currentRoom) return;
  errorMsg = "";
  socket.emit(event, Object.assign({ roomCode: currentRoom }, payload||{}));
}
/* ===================== ACTIONS (emit to server) ===================== */
function joinRoom() {
  const codeInput = document.getElementById("roomCodeInput");
  const nameInput = document.getElementById("playerNameInput");
  if (!codeInput) return;
  
  const code = codeInput.value.trim().toUpperCase();
  const userName = nameInput ? nameInput.value.trim() : "";
  if (!code) {
    alert("Please enter a valid room code!");
    return;
  }
  currentRoom = code;
  socket.emit("joinRoom", { roomCode: currentRoom, name: userName });
}
function startGame() {
  emitAction("startGame");
}
function sendChat() {
  const input = document.getElementById("chatInputField");
  if (!input || !input.value.trim()) return;
  emitAction("sendChat", { text: input.value.trim() });
  input.value = "";
}
function handleChatKeyPress(event) {
  if (event.key === "Enter") {
    sendChat();
  }
}
function beginChallengeAction(){ emitAction("chooseAction", { actionType: "challenge" }); }
function humanSwapBegin(){ emitAction("chooseAction", { actionType: "swap" }); }
function humanPickUp(){ emitAction("pickUp"); }
function humanChooseTarget(targetId){ emitAction("chooseTarget", { targetId }); }
function humanSwapChooseTarget(targetId){ emitAction("swapChooseTarget", { targetId }); }
function humanChooseType(type){ emitAction("chooseChallengeType", { challengeType: type }); }
function humanChooseValue(value){ emitAction("chooseChallengeValue", { value }); }
function humanSelectCard(cardId){
  emitAction("selectCard", { cardId });
}
function humanLockIn(){ emitAction("lockInChallenge"); }
function humanDefendCardClick(cardId){ emitAction("defendCard", { cardId }); }
function finalizeDefenseNumberWilds(){ emitAction("lockInDefense"); }
function humanSwapSelectCard(cardId){ emitAction("swapSelectCard", { cardId }); }
function humanSwapLockIn(){ emitAction("swapLockIn"); }
function continueAfterReveal(){ emitAction("continueAfterReveal"); }

/* ===================== NEW BACKGROUND NETWORK SCRIPTS ===================== */
function sendRefreshAction() {
  if (!currentRoom) return;
  fetch('/api/game/refresh', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ roomCode: currentRoom, playerId: socket.id })
  })
  .then(res => {
    if (!res.ok) console.error("Refresh action communication encountered a system error.");
  })
  .catch(err => console.error("Network connection failure during refresh transmission:", err));
}

function sendCommitOutcome() {
  if (!currentRoom) return;
  fetch('/api/game/commit', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ roomCode: currentRoom, playerId: socket.id })
  })
  .then(res => {
    if (!res.ok) console.error("Commit outcome action encountered a system error.");
  })
  .catch(err => console.error("Network connection failure during commit transmission:", err));
}

/* ===================== RENDER: CARDS & OPPONENTS ===================== */
function renderCard(card, opts={}){
  opts = opts||{};
  const cls = ['card'];
  if(opts.mini) cls.push('mini');
  if(opts.selectable) cls.push('selectable');
  if(opts.selected) cls.push('selected');
  if(opts.won) cls.push('won');
  if(opts.lost) cls.push('lost');
  if(opts.disabled) cls.push('disabled');

  const info = colorInfo(card.color);
  return `<div class="${cls.join(' ')}" style="background:${info.hex};color:${info.text};"
    ${opts.onclick? `onclick="${opts.onclick}"`:''} data-card="${card.id}">
    <div class="corner">${card.num}</div>
    <div class="mid">${info.label[0]}</div>
    <div class="corner bottom">${card.num}</div>
  </div>`;
}
function renderOpponent(p){
  const isTurn = roomState.phase!=='gameover' && roomState.activePlayer===p.id;
  const targetable = !isSpectator() && (roomState.phase==='choose-target' || roomState.phase==='swap-choose-target');
  const onclickAttr = roomState.phase==='choose-target' ? `onclick="humanChooseTarget('${p.id}')"`
                     : roomState.phase==='swap-choose-target' ? `onclick="humanSwapChooseTarget('${p.id}')"`
                     : '';
  const backs = Array.from({length:Math.min(p.handCount,6)}).map(()=>`<div class="cardback"></div>`).join('');
  return `<div class="opp ${targetable?'targetable':''} ${isTurn?'active-turn':''}" ${onclickAttr}>
    <div class="name">${p.name}${isTurn?' 🎲':''}</div>
    <div class="sub">${p.handCount} card${p.handCount!==1?'s':''}</div>
    <div class="score">${p.score}</div>
    <div class="cardback-stack">${backs}</div>
  </div>`;
}
/* ===================== RENDER: CENTER STAGE ===================== */
function renderCenterStage(){
  let duelHtml = `<div class="idle-msg">Waiting for the next challenge…</div>`;
  if(['swap-choose-target','swap-choose-card'].includes(roomState.phase) && roomState.swap){
    const initName = nameOfPerspective(roomState.swap.initiatorId);
    const targName = roomState.swap.targetId ? nameOfPerspective(roomState.swap.targetId) : '…';
    duelHtml = `<div class="idle-msg">🔄 ${initName} is arranging a swap with ${targName}</div>`;
  }
  const challengePhases = ['choose-type','choose-value','choose-card','awaiting-human-defense','defense-number-wild-choice','revealing','reveal'];
  if(challengePhases.includes(roomState.phase) && roomState.challenge){
    const ch = roomState.challenge;
    let badgeHtml='';
    if(ch.value!==undefined && ch.value!==null){
      if(ch.type==='color'){
        const info=colorInfo(ch.value);
        badgeHtml = `<div class="trump-plaque"><div class="trump-label">Trump Color</div>
          <div class="trump-badge" style="background:${info.hex};color:${info.text};">${info.label[0]}</div></div>`;
      } else {
        badgeHtml = `<div class="trump-plaque"><div class="trump-label">Trump Number</div>
          <div class="trump-badge number-badge">${ch.value}</div></div>`;
      }
    }
    let cardsHtml='';
    if(roomState.phase==='revealing'){
      cardsHtml = `<div class="idle-msg">Revealing…</div>`;
    } else if(roomState.phase==='reveal' && roomState.reveal){
      const r = roomState.reveal;
      const cWon = r.winner==='challenger', tWon = r.winner==='target';
      const cCardsHtml = r.challengerCards.length
        ? r.challengerCards.map(c=>renderCard(c,{mini:true, won:cWon, lost:!cWon && r.winner})).join('')
        : `<div class="idle-msg" style="font-size:11px;">none</div>`;
      const tCardsHtml = r.targetCards.length
        ? r.targetCards.map(c=>renderCard(c,{mini:true, won:tWon, lost:!tWon && r.winner})).join('')
        : `<div class="idle-msg" style="font-size:11px;">none</div>`;
      cardsHtml = `<div class="duel-cards">
        <div class="duel-side"><div class="who">${nameOfPerspective(r.challengerId)}</div><div style="display:flex;gap:4px;">${cCardsHtml}</div></div>
        <div class="duel-vs">VS</div>
        <div class="duel-side"><div class="who">${nameOfPerspective(r.targetId)}</div><div style="display:flex;gap:4px;">${tCardsHtml}</div></div>
      </div>`;
    }
    duelHtml = `<div style="display:flex;flex-direction:column;align-items:center;gap:10px;">
      ${badgeHtml}
      ${cardsHtml}
    </div>`;
  }
  return `<div class="center-stage">
    <div class="pile-info">Draw<span class="count">${roomState.drawCount}</span></div>
    <div class="duel-area">${duelHtml}</div>
    <div class="pile-info">Discard<span class="count">${roomState.discardCount}</span></div>
  </div>`;
}
/* ===================== RENDER: STATUS / PROMPT / CONTROLS ===================== */
function renderStatusBanner(){
  if(roomState.status === 'waiting'){
    let startBtn = "";
    if (roomState.players.length >= 2 && !isSpectator()) {
      startBtn = `<br><button class="go-btn" style="margin-top:10px;" onclick="startGame()">▶ Start Game</button>`;
    }
    return `<div class="status-banner">Waiting for players... (${roomState.playerCount}/4 players joined)${startBtn}</div>`;
  }
  if(roomState.status === 'finished'){
    return `<div class="status-banner">${roomState.winner === socket.id ? '🏆 YOU WIN!' : '💀 DEFEAT'}</div>`;
  }
  if(isSpectator()) {
    return `<div class="status-banner">👁 YOU ARE SPECTATING - Game In Progress</div>`;
  }
  const ch = roomState.challenge;
  const sw = roomState.swap;
  let text;
  if(ch && ch.targetId){
    text = `${nameOfPerspective(ch.challengerId)} Challenging ${nameOfPerspective(ch.targetId)}`;
  } else if(sw && sw.targetId){
    text = `${nameOfPerspective(sw.initiatorId)} Swapping with ${nameOfPerspective(sw.targetId)}`;
  } else {
    text = isMyTurn() ? '⭐ YOUR TURN' : `⏳ ${nameOf(roomState.activePlayer)}'S TURN`;
  }
  return `<div class="status-banner">${text}</div>`;
}
function renderPrompt(){
  if (isSpectator()) {
    return `<div class="prompt">Spectating live game tracking activities...</div>`;
  }
  const ch = roomState.challenge;
  const isPlaying = roomState.status === 'playing';
  if(!isPlaying) return `<div class="prompt">Room is setup. Waiting for host to click Start Game...</div>`;
  
  if (roomState.phase === 'awaiting-human-defense') {
      if (socket.id === ch.targetId) {
          const info = ch.type==='color' ? colorInfo(ch.value).label : ch.value;
          const hasMatch = ch.type==='color' && me().hand.some(x=>x.color===ch.value);
          const followText = hasMatch ? ' You hold that color — you must play it.' : '';
          return `<div class="prompt">${nameOf(ch.challengerId)} has challenged you! Trump color: <b>${info}</b>. Choose your defending card.${followText}</div>`;
      } else {
          return `<div class="prompt">Awaiting defense choices from ${nameOf(ch.targetId)}...</div>`;
      }
  }
  if (roomState.phase === 'defense-number-wild-choice') {
      if (socket.id === ch.targetId) {
          return `<div class="prompt">You must match the exact card count (${ch.challengerCards.length} cards)! Press Reveal when ready.</div>`;
      } else {
          return `<div class="prompt">Awaiting defense confirmation choices from ${nameOf(ch.targetId)}...</div>`;
      }
  }
  if(!isMyTurn()) {
    return `<div class="prompt">Waiting for opponent to move...</div>`;
  }
  if(roomState.phase==='choose-action') return `<div class="prompt">Your turn. What would you like to do?</div>`;
  if(roomState.phase==='choose-target') return `<div class="prompt">Choose who to challenge.</div>`;
  if(roomState.phase==='swap-choose-target') return `<div class="prompt">Choose who to swap a card with.</div>`;
  if(roomState.phase==='swap-choose-card') return `<div class="prompt">Choose one of your cards to send to ${nameOf(roomState.swap.targetId)}. You'll receive a random card of theirs in return.</div>`;
  if(roomState.phase==='choose-type') return `<div class="prompt">Challenging ${nameOf(ch.targetId)} — call a Color or a Number as trump.</div>`;
  if(roomState.phase==='choose-value') return `<div class="prompt">Pick the ${ch.type==='color'?'color':'number'} to call as trump.</div>`;
  
  if(roomState.phase==='choose-card'){
    if(ch.type==='number'){
      const n = ch.challengerCards.length;
      return `<div class="prompt">You're playing ${n} card${n!==1?'s':''} showing ${ch.value}${n>0? ' — win for a flat +15 pts, but lose/tie and you drop 15 pts.':' — you have none yet! Risky bluff, and a loss costs you 15 pts.'}</div>`;
    }
    return `<div class="prompt">Pick one card from your hand to play in this duel.</div>`;
  }
  
  if(roomState.phase==='reveal' && roomState.reveal){
    const r = roomState.reveal;
    let txt;
    if(!r.winner) txt = "Tie — no points awarded.";
    else {
      const wId = r.winner==='challenger' ? r.challengerId : r.targetId;
      txt = `${nameOfPerspective(wId)} won +${r.scoreGain} pts!`;
    }
    if(r.challengerPenalized){
      txt += ` ${nameOfPerspective(r.challengerId)} loses 15 pts.`;
    }
    return `<div class="prompt">${txt}</div>`;
  }
  return '';
}
function renderControls(){
  if (isSpectator()) return '';
  const ch = roomState.challenge;
  
  if (roomState.phase === 'awaiting-human-defense') return ''; 
  if (roomState.phase === 'defense-number-wild-choice') {
     if (socket.id !== ch.targetId) return '';
     return `<div class="btn-row"><button class="confirm-btn" onclick="finalizeDefenseNumberWilds()">Reveal</button></div>`;
  }

  /* ===================== UPDATED DYNAMIC CONTROLS REGION ===================== */
  // Determine states based on current turn & game layout phase configuration
  const myPlayer = roomState.players.find(p=>p.id===socket.id);
  const isIdle = roomState.phase === 'choose-action';
  
  // Base turn conditions
  const turnAllowed = isMyTurn() && roomState.status === 'playing';
  const canSwap = myPlayer && !myPlayer.usedSwapLastTurn && me().hand.length>0;
  const canPickup = myPlayer && !myPlayer.usedPickupLastTurn && roomState.drawCount>0;

  // Toggle flags implemented based on requirements criteria
  const mainActionsDisabled = !turnAllowed || !isIdle;
  const workflowToolsDisabled = !turnAllowed || isIdle;

  let utilityButtonsHtml = `
    <div class="btn-row" style="margin-top: 14px; border-top: 1px dashed var(--line); padding-top: 12px; width: 100%;">
      <button class="choice-btn" style="background-color: var(--panel-2); font-weight: 600;" ${workflowToolsDisabled ? 'disabled' : ''} onclick="sendRefreshAction()">🔄 Refresh (Undo Action)</button>
      <button class="confirm-btn" style="background-color: var(--brass);" ${workflowToolsDisabled ? 'disabled' : ''} onclick="sendCommitOutcome()">🤝 Commit Outcome</button>
    </div>
  `;

  if(!isMyTurn()) {
    return `<div class="btn-row">` + utilityButtonsHtml + `</div>`;
  }

  if(roomState.phase==='choose-action'){
    return `<div class="btn-row">
      <button class="choice-btn" ${mainActionsDisabled?'disabled':''} onclick="beginChallengeAction()">⚔️ Challenge a Player</button>
      <button class="choice-btn" ${ (mainActionsDisabled || !canSwap)?'disabled':'' } title="${canSwap?'':'Swap was used last turn'}" onclick="humanSwapBegin()">🔄 Swap Cards</button>
      <button class="choice-btn" ${ (mainActionsDisabled || !canPickup)?'disabled':'' } title="${canPickup?'':'Pick-up was used last turn, or the pile is empty'}" onclick="humanPickUp()">📥 Pick Up Extra Card</button>
      ${utilityButtonsHtml}
    </div>`;
  }
  if(roomState.phase==='swap-choose-card'){
    return `<div class="btn-row">
      <button class="confirm-btn" ${roomState.swap.myCardId? '':'disabled'} onclick="humanSwapLockIn()">Lock In Swap</button>
      ${utilityButtonsHtml}
    </div>`;
  }
  if(roomState.phase==='choose-type'){
    return `<div class="btn-row">
      <button class="choice-btn" onclick="humanChooseType('color')">Call a Color</button>
      <button class="choice-btn" onclick="humanChooseType('number')">Call a Number</button>
      ${utilityButtonsHtml}
    </div>`;
  }
  if(roomState.phase==='choose-value'){
    if(ch.type==='color'){
      const swatches = COLORS.map(c=>`<button class="swatch-btn" style="background:${c.hex};color:${c.text};"
        onclick="humanChooseValue('${c.key}')">${c.label[0]}</button>`).join('');
      return `<div class="btn-row">${swatches} ${utilityButtonsHtml}</div>`;
    } else {
      const counts={};
      me().hand.forEach(c=>{ counts[c.num]=(counts[c.num]||0)+1; });
      const nums = Array.from({length:10},(_,n)=>`<button class="num-btn" onclick="humanChooseValue(${n})">${n}<span class="ct">${counts[n]||0}x</span></button>`).join('');
      return `<div class="btn-row">${nums} ${utilityButtonsHtml}</div>`;
    }
  }
  if(roomState.phase==='choose-card'){
    if(ch.type==='number'){
      return `<div class="btn-row"><button class="confirm-btn" onclick="humanLockIn()">Lock In</button> ${utilityButtonsHtml}</div>`;
    }
    return `<div class="btn-row">
      <button class="confirm-btn" ${ch.selectedCardId? '':'disabled'} onclick="humanLockIn()">Lock In</button>
      ${utilityButtonsHtml}
    </div>`;
  }
  if(roomState.phase==='reveal'){
    return `<div class="btn-row"><button class="confirm-btn" onclick="continueAfterReveal()">Continue</button> ${utilityButtonsHtml}</div>`;
  }
  return '';
}
function renderHand(){
  if (isSpectator()) return `<div class="idle-msg">You are observing this match. Hand views hidden.</div>`;
  const myself = me();
  if(!myself) return '';
  const ch = roomState.challenge;
  return myself.hand.map(c=>{
    let selectable=false, selected=false, disabled=false, onclick=null;
    if(roomState.phase==='choose-card' && ch && ch.type==='color' && isMyTurn()){
      selectable=true; selected = ch.selectedCardId===c.id;
      onclick = `humanSelectCard('${c.id}')`;
    }
    if(roomState.phase==='choose-card' && ch && ch.type==='number'){
      selected = ch.challengerCards.some(cc=>cc.id===c.id);
    }
    if(roomState.phase==='awaiting-human-defense' && ch){
      if (socket.id === ch.targetId) {
          const hasMatch = myself.hand.some(x=>x.color===ch.value);
          selectable = hasMatch ? (c.color===ch.value) : true;
          disabled = !selectable;
          if(selectable) onclick = `humanDefendCardClick('${c.id}')`;
      } else {
          disabled = true;
      }
    }
    if(roomState.phase==='defense-number-wild-choice'){
      selected = ch.targetCards.some(tc=>tc.id===c.id);
    }
    if(roomState.phase==='swap-choose-card' && isMyTurn()){
      selectable=true; selected = roomState.swap.myCardId===c.id;
      onclick = `humanSwapSelectCard('${c.id}')`;
    }
    return renderCard(c,{selectable, selected, disabled, onclick});
  }).join('');
}
/* ===================== RENDER: START / GAME OVER ===================== */
function renderStartScreen() {
  document.getElementById('app').innerHTML = `
    <h1 class="brand">Chroma Clash</h1>
    <div class="tagline">Online Multiplayer Duel</div>
    <div class="start-card">
      
      <h2>SUMMARY</h2>
      <p style="text-align: left; margin-bottom: 14px;">
        Chroma Clash is a tactical, real-time multiplayer card battle game of bluffs, trump calls, and counts. Players use an 80-card elemental deck to out-score opponents through deliberate phase challenges, sight-unseen hand swaps, and high-stakes risk prediction.
      </p>
      <h2>GAME RULES</h2>
      <div class="rules">
        • <b>The Room Rules:</b> Dynamic matchmaking allows 2 to 4 players to compete in a room simultaneously. Anyone who joins a room after the game has started will automatically join as a spectator.<br>
        • <b>The Deck Structure:</b> 80 cards total — 8 distinct colors × numbers 0–9. All players are dealt an initial hand setup of 10 cards.<br>
        • <b>Turn Actions:</b> On your active turn, you draw a card, then must choose one of three actions: <b>Challenge</b> an opponent, <b>Swap</b> cards, or <b>Pick Up</b> an extra card.<br><br>
        • <b>Action Restrictions:</b> Swap and Pick Up cannot be used two turns in a row.<br><br>
        • <b>⚔️ Color Challenge Call:</b> You call a trump color and choose one card. Your target must play a matching color card if they hold one. Higher card value within the trump color wins. The winner banks the absolute sum value of both played cards.<br>
        <div class="visual-scenario">
          <b>Visual Example (Color Challenge):</b><br>
          Challenger plays <b>[Red 7]</b> (Trump Call: Red) VS Target plays <b>[Red 3]</b> -> Challenger Wins and gains <b>10 pts</b> (7 + 3).<br>
          Challenger plays <b>[Red 2]</b> (Trump Call: Red) VS Target plays <b>[Teal 9]</b> -> Challenger Wins (Trump beats non-trump) and gains <b>11 pts</b>.
        </div><br>
        • <b>⚔️ Number Challenge Call:</b> Enforces a strict <b>Mandatory Matching Count Mechanic</b>. You call a number and put forward all your cards matching that value. <b>The defender must match the exact number of cards played by the challenger</b>. Whoever holds the larger total value wins a flat 15 points. If you initiate a number challenge and lose or tie, you are hit with a heavy <b>-15 point penalty</b>.<br>
        <div class="visual-scenario">
          <b>Visual Example (Number Challenge Match Count):</b><br>
          Challenger plays two cards: <b>[Blue 4]</b> and <b>[Green 4]</b> (Total: 2 cards). Defender holds <b>[Orange 4]</b> and <b>[Red 4]</b>. Defender must choose both cards to match the exact length of 2 cards.
        </div><br>
        • <b>Fresh Draw Rule:</b> If your hand drops to zero cards, you instantly draw 5 fresh cards (requires at least 10 cards left in the draw pile). The game terminates when the draw pile runs dry. Highest score wins!
      </div>
      <div style="margin: 20px 0;">
        <input type="text" id="playerNameInput" class="room-input" placeholder="ENTER YOUR NAME" maxlength="16" />
        <br>
        <input type="text" id="roomCodeInput" class="room-input code-field" placeholder="ROOM CODE" value="ROOM1" />
        <br>
        <button class="go-btn" onclick="joinRoom()">Join Game Room</button>
      </div>
    </div>
  `;
}
function renderGameOver(){
  const sorted = [...roomState.players].sort((a,b)=>b.score-a.score);
  const rows = sorted.map((p,i)=>`<div class="standing ${i===0?'winner':''}">
    <span class="rank">${i+1}.</span><span>${nameOf(p.id)}${i===0?' 🏆':''}</span><span>${p.score} pts</span>
  </div>`).join('');
  const iWon = roomState.winner === socket.id;
  return `<div class="overlay"><div class="gameover-card">
    <h2>${iWon ? '🎉 VICTORY!' : '💀 GAME OVER'}</h2>
    <p style="color:var(--ink-dim);font-size:13px;margin-top:2px;">The draw pile is empty — you finished on top!</p>
    <div style="margin:16px 0;">${rows}</div>
    <button class="go-btn" onclick="location.reload()">Play Again</button>
  </div></div>`;
}
/* ===================== MAIN RENDER ===================== */
function render() {
  if (!roomState) {
    renderStartScreen();
    return;
  }
  const app = document.getElementById('app');
  const opponentsHtml = opponents().map(p=>renderOpponent(p)).join('');
  const centerHtml = renderCenterStage();
  const statusHtml = renderStatusBanner();
  const logHtml = logs.slice(0, 20).map(l => `<div>${l}</div>`).join('');
  const chatHtml = chatMessages.map(m => `<div><b>${m.user}:</b> ${m.text}</div>`).join('');
  const promptHtml = renderPrompt();
  const controlsHtml = renderControls();
  const handHtml = renderHand();
  const myself = me();
  
  const bottomHtml = `<div class="player-area">
    <div class="player-head">
      <div class="who">${isSpectator() ? 'Spectating Profile' : (myself ? myself.name : 'You')} ${isMyTurn() && roomState.status==='playing' ? '🎲':''}</div>
      <div class="sc">${isSpectator() ? '👁' : (myself ? myself.score : 0)}</div>
    </div>
    ${errorMsg ? `<div style="color:var(--danger); text-align:center; margin-bottom:10px; font-weight:bold;">⚠️ ${errorMsg}</div>` : ''}
    <div class="hand">${handHtml}</div>
    ${promptHtml}
    ${controlsHtml}
  </div>`;
  
  app.innerHTML = `
    <h1 class="brand">Chroma Clash</h1>
    <div class="tagline">Room: ${currentRoom}</div>
    ${statusHtml}
    <div class="game-layout">
      <div class="game-main">
        <div class="opponents">${opponentsHtml}</div>
        ${centerHtml}
        ${bottomHtml}
      </div>
      <div class="game-side">
        <!-- Live Expandable Rules Accompaniment Panel -->
        <div class="expandable-rules-container">
          <details>
            <summary>📋 Reference Rules</summary>
            <div class="expandable-rules-content">
              <b>Color Challenge:</b> Trump beats non-trump. Same color beats lower number. Winner scores the summed face values of both cards.<br><br>
              <b>Number Challenge:</b> Enforces count matching. Defender <i>must</i> match the exact count of cards put forward by the challenger. Winner gets flat +15 points. Challenger loses -15 points on ties or losses.
            </div>
          </details>
        </div>
        
        <!-- Collapsible Table History Panel -->
        <div class="history-panel">
          <details open>
            <summary>📋 Table Activity</summary>
            <div class="log-panel">${logHtml}</div>
          </details>
        </div>

        <!-- Collapsible Player Chat Feature Box -->
        <div class="chat-panel">
          <details open>
            <summary>💬 Player Chat</summary>
            <div class="chat-log-panel">${chatHtml}</div>
            <div class="chat-input-row">
              <input type="text" id="chatInputField" placeholder="Type message..." onkeypress="handleChatKeyPress(event)" maxlength="80">
              <button onclick="sendChat()">Send</button>
            </div>
          </details>
        </div>
      </div>
    </div>
    ${roomState.status==='finished' ? renderGameOver() : ''}
  `;
}
renderStartScreen();
</script>
</body>
</html>
